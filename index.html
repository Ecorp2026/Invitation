<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Athul & Aswathykutty</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FDFBF7',
                        gold: '#C5A059',
                        emerald: '#064E3B',
                        'emerald-dark': '#022C1E',
                        'gold-light': '#E5D5B7',
                        ink: '#1A1A1A',
                        kumkum: '#B22222',
                        saffron: '#F4C430',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                        sans: ['Inter', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #FDFBF7;
            color: #1A1A1A;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .corner-deco {
            position: absolute;
            width: 5rem;
            height: 5rem;
            border: 1px solid #B22222;
            opacity: 0.3;
            pointer-events: none;
        }
        
        .top-left {
            top: 1.25rem;
            left: 1.25rem;
            border-right: 0;
            border-bottom: 0;
        }
        
        .bottom-right {
            bottom: 1.25rem;
            right: 1.25rem;
            border-left: 0;
            border-top: 0;
        }

        .paisley-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10c-5 0-10 5-10 10s5 10 10 10 10-5 10-10-5-10-10-10zm0 30c-15 0-25 10-25 25s10 25 25 25 25-10 25-25-10-25-25-25zm0 10c8 0 15 7 15 15s-7 15-15 15-15-7-15-15 7-15 15-15z' fill='%23C5A059' fill-opacity='0.05'/%3E%3C/svg%3E");
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 4px double rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = Motion;

        // --- Constants ---
        const WEDDING_DATE = new Date('2026-10-25T16:00:00');
        const COUPLE_NAMES = { first: "Athul AR", second: "Aswathykutty S" };
        const VENUE = {
            name: "Ajnaj Convention Center, Chavara",
            address: "Chavara, Kollam, Kerala 691583, India",
            googleMapsUrl: "https://www.google.com/maps/search/?api=1&query=Ajnaj+Convention+Center+Chavara+Kerala",
            embedUrl: "https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3941.745423854123!2d76.53634137586617!3d8.991523989184518!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b06030999999999%3A0x9999999999999999!2sAjnaj%20Convention%20Center!5e0!3m2!1sen!2sin!4v1713180000000!5m2!1sen!2sin"
        };

        // --- Icons ---
        const HeartIcon = ({ className }) => (
            <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        );

        // --- Components ---

        const KineticText = ({ text }) => {
            const letters = Array.from(text);
            const container = {
                hidden: { opacity: 0 },
                visible: {
                    opacity: 1,
                    transition: { staggerChildren: 0.04, delayChildren: 0.2 },
                },
            };
            const child = {
                visible: {
                    opacity: 1,
                    filter: "blur(0px)",
                    y: 0,
                    transition: { duration: 0.8, ease: [0.2, 0.65, 0.3, 0.9] },
                },
                hidden: { opacity: 0, filter: "blur(8px)", y: 10 },
            };
            return (
                <motion.span variants={container} initial="hidden" animate="visible" className="inline-block">
                    {letters.map((letter, index) => (
                        <motion.span variants={child} key={index} className="inline-block whitespace-pre">
                            {letter}
                        </motion.span>
                    ))}
                </motion.span>
            );
        };

        const Countdown = () => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const [isExpired, setIsExpired] = useState(false);

            useEffect(() => {
                const calculateTimeLeft = () => {
                    const now = new Date().getTime();
                    const distance = WEDDING_DATE.getTime() - now;
                    if (distance <= 0) {
                        setIsExpired(true);
                        return true;
                    }
                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000)
                    });
                    return false;
                };
                const expired = calculateTimeLeft();
                if (expired) return;
                const timer = setInterval(calculateTimeLeft, 1000);
                return () => clearInterval(timer);
            }, []);

            if (isExpired) return null;

            return (
                <div className="flex gap-4 md:gap-6 px-6 py-4 glass-card rounded-xl shadow-md">
                    {Object.entries(timeLeft).map(([label, value]) => (
                        <div key={label} className="text-center">
                            <span className="block text-xl md:text-2xl font-bold text-emerald">{value}</span>
                            <span className="text-[8px] md:text-[9px] uppercase tracking-[0.2em] font-bold text-gold">{label}</span>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const googleUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(`Wedding of ${COUPLE_NAMES.first} & ${COUPLE_NAMES.second}`)}&dates=20261025T160000Z/20261025T230000Z&details=We+can't+wait+to+celebrate+with+you!&location=${encodeURIComponent(VENUE.address)}`;

            const downloadIcs = () => {
                const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTART:20261025T160000Z
DTEND:20261025T230000Z
SUMMARY:Wedding of ${COUPLE_NAMES.first} & ${COUPLE_NAMES.second}
LOCATION:${VENUE.address}
DESCRIPTION:We can't wait to celebrate with you!
END:VEVENT
END:VCALENDAR`;
                const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.setAttribute('download', 'wedding-invite.ics');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen bg-cream md:p-3">
                    <div className="max-w-7xl mx-auto md:border-[12px] border-emerald bg-gold-light grid grid-cols-1 md:grid-cols-[1.4fr_1fr] gap-px overflow-hidden shadow-2xl">
                        
                        {/* --- Hero Section --- */}
                        <section className="bg-cream paisley-bg p-10 py-16 md:p-12 md:py-20 relative flex flex-col justify-center min-h-[700px] md:row-span-2 md:border-r border-gold-light text-center">
                            <div className="corner-deco top-left" />
                            
                            <div className="absolute top-6 left-1/2 -translate-x-1/2 text-saffron opacity-80">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C10.34 2 9 3.34 9 5C9 6.66 10.34 8 12 8C13.66 8 15 6.66 15 5C15 3.34 13.66 2 12 2ZM12 4C12.55 4 13 4.45 13 5C13 5.55 12.55 6 12 6C11.45 6 11 5.55 11 5C11 4.45 11.45 4 12 4ZM12 9C9.79 9 8 10.79 8 13C8 15.21 9.79 17 12 17C14.21 17 16 15.21 16 13C16 10.79 14.21 9 12 9ZM12 15C10.9 15 10 14.1 10 13C10 11.9 10.9 11 12 11C13.1 11 14 11.9 14 13C14 14.1 13.1 15 12 15ZM19 13C19 11.34 17.66 10 16 10H17C18.1 10 19 9.1 19 8C19 6.9 18.1 6 17 6H16C16 4.34 14.66 3 13 3H11C9.34 3 8 4.34 8 6H7C5.9 6 5 6.9 5 8C5 9.1 5.9 10 7 10H8C6.34 10 5 11.34 5 13C5 14.66 6.34 16 8 16V18C8 19.66 9.34 21 11 21H13C14.66 21 16 19.66 16 18V16C17.66 16 19 14.66 19 13ZM14 18C14 18.55 13.55 19 13 19H11C10.45 19 10 18.55 10 18V16H14V18Z" /></svg>
                            </div>

                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ duration: 1.5 }} className="flex flex-col items-center">
                                <h1 className="text-4xl sm:text-5xl md:text-6xl font-serif text-emerald leading-tight md:leading-[1.1] mb-6 break-words max-w-full">
                                    <KineticText text={COUPLE_NAMES.first} />
                                    <br className="hidden md:block" /> 
                                    <motion.span initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} transition={{ delay: 0.8, duration: 1 }} className="md:inline mx-2">&</motion.span> 
                                    <KineticText text={COUPLE_NAMES.second} />
                                </h1>
                                
                                <p className="text-[13px] md:text-sm font-serif italic text-emerald/60 max-w-xs mb-8 leading-relaxed">
                                    With joyful hearts, we invite you to join us as we celebrate our wedding day.
                                </p>

                                <div className="flex flex-col items-center mb-10">
                                    <motion.div animate={{ scale: [1, 1.03, 1], borderColor: ["rgba(197, 160, 89, 0.3)", "rgba(197, 160, 89, 0.6)", "rgba(197, 160, 89, 0.3)"] }} transition={{ duration: 4, repeat: Infinity, ease: "easeInOut" }} className="relative p-6 md:p-8 border-double border-4 border-gold/40 bg-white/50 backdrop-blur-md rounded-2xl shadow-xl flex flex-col items-center min-w-[220px]">
                                        <div className="text-xs md:text-sm uppercase tracking-[0.3em] text-kumkum font-bold mb-2">Sunday</div>
                                        <div className="text-7xl md:text-8xl font-serif text-emerald leading-none my-2 drop-shadow-sm">25</div>
                                        <div className="text-base md:text-lg uppercase tracking-[0.2em] text-gold font-medium">October 2026</div>
                                        
                                        {/* Muhurtham Section */}
                                        <div className="flex items-center gap-3 my-3">
                                            <div className="w-8 h-px bg-gold/30" />
                                            <div className="w-1.5 h-1.5 bg-gold/40 rotate-45" />
                                            <div className="w-8 h-px bg-gold/30" />
                                        </div>
                                        <div className="text-center">
                                            <div className="font-serif italic text-emerald text-xl md:text-2xl mb-0.5">Muhurtham</div>
                                            <div className="font-sans text-gold text-[9px] md:text-[10px] tracking-[0.2em] font-bold uppercase">11:15 AM – 11:45 AM</div>
                                        </div>
                                        
                                        {/* Decorative Heart accents */}
                                        <div className="absolute -top-3 -left-3 text-gold/40 rotate-45">
                                            <HeartIcon className="w-6 h-6 fill-current" />
                                        </div>
                                        <div className="absolute -bottom-3 -right-3 text-gold/40 rotate-45">
                                            <HeartIcon className="w-6 h-6 fill-current" />
                                        </div>
                                    </motion.div>
                                </div>
                                
                                <div className="w-full flex justify-center">
                                    <Countdown />
                                </div>
                            </motion.div>
                        </section>

                        {/* --- Venue Section --- */}
                        <section className="bg-cream p-8 md:p-10 border-b border-gold-light md:border-b-0">
                            <h2 className="text-sm uppercase font-sans font-bold tracking-[0.3em] mb-8 border-b pb-2 text-gold border-kumkum/30">The Venue</h2>
                            <div className="relative w-full h-40 bg-[#e0ddd8] border border-gold-light flex items-center justify-center mb-6 overflow-hidden group">
                                <iframe src={VENUE.embedUrl} width="100%" height="100%" style={{ border: 0 }} allowFullScreen loading="lazy" className="grayscale hover:grayscale-0 transition-all duration-700 opacity-60 group-hover:opacity-100" />
                                <div className="absolute inset-0 pointer-events-none flex items-center justify-center group-hover:hidden">
                                    <div className="w-5 h-5 bg-emerald rounded-full rounded-br-none -rotate-45 border-2 border-white shadow-lg" />
                                </div>
                            </div>
                            <div className="text-sm leading-relaxed">
                                <strong className="text-emerald text-lg font-serif block mb-2">{VENUE.name}</strong>
                                {VENUE.address}
                            </div>
                            <a href={VENUE.googleMapsUrl} target="_blank" rel="noopener noreferrer" className="block w-full py-4 bg-gold text-emerald text-center font-bold uppercase tracking-widest text-xs hover:bg-gold/90 transition-colors mt-6">Get Directions</a>
                        </section>

                        {/* --- Reminder Section --- */}
                        <section className="bg-cream p-8 md:p-10 flex flex-col justify-center">
                            <h2 className="text-sm uppercase font-sans font-bold tracking-[0.3em] mb-8 border-b pb-2 text-gold border-kumkum/30">Set Reminder</h2>
                            <p className="text-sm text-ink/60 mb-6 italic">Don't miss the wedding. Add the date to your calendar.</p>
                            <div className="space-y-3">
                                <a href={googleUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-3 w-full py-3.5 border border-gold text-gold font-bold uppercase tracking-widest text-xs hover:bg-gold/5 transition-colors">Google Calendar</a>
                                <button onClick={downloadIcs} className="flex items-center justify-center gap-3 w-full py-3.5 border border-gold text-gold font-bold uppercase tracking-widest text-xs hover:bg-gold/5 transition-colors">Apple Calendar</button>
                            </div>
                        </section>
                    </div>
                    
                    <footer className="py-10 text-center">
                        <div className="text-gold font-serif italic text-xl">{COUPLE_NAMES.first} & {COUPLE_NAMES.second}</div>
                        <div className="text-[10px] uppercase tracking-[0.4em] text-emerald/30 mt-2">Wedding 2026</div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
